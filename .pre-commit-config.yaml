repos:
  - repo: local
    hooks:
      - id: build-rendered-decks
        name: Build rendered decks (PDF + HTML)
        entry: npm run build:rendered
        language: system
        files: ^decks/(starter|layout-test)\.md$
        pass_filenames: false
      - id: build-screenshots
        name: Build README screenshots
        entry: npm run build:screenshots
        language: system
        files: ^decks/(starter|layout-test)\.md$
        pass_filenames: false
